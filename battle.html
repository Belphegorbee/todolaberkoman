        :root {

            --neon-magenta: #ff0055;
            --neon-green: #39ff14;
            --neon-yellow: #ffe600;
            --neon-purple: #b5179e;
            --text-main: #f8fafc;
            --text-muted: #475569;
            --cyber-grid: linear-gradient(to right, rgba(0, 243, 255, 0.015) 1px, transparent 1px),
                          linear-gradient(to bottom, rgba(0, 243, 255, 0.015) 1px, transparent 1px);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background-color: var(--bg-main); background-image: var(--cyber-grid); background-size: 20px 20px;
            color: var(--text-main); font-family: 'Rajdhani', sans-serif; padding: 12px;
            display: flex; flex-direction: column; align-items: center; min-height: 100vh;
        }

        .cyber-font { font-family: 'Orbitron', sans-serif; }

        header {
            width: 100%; max-width: 850px; display: flex; justify-content: space-between; align-items: center;
            padding: 16px; background: rgba(8, 12, 22, 0.9); border: 1px solid rgba(0, 243, 255, 0.15);
            border-bottom: 3px solid var(--neon-magenta); border-radius: 6px; backdrop-filter: blur(8px); margin-bottom: 15px;
            box-shadow: 0 0 20px rgba(255, 0, 85, 0.1); gap: 12px; flex-wrap: wrap;
        }

        header > div { flex: 1; min-width: 0; }

        h1 { font-size: 18px; font-weight: 900; letter-spacing: 2px; text-shadow: 0 0 10px rgba(255, 0, 85, 0.3); }

        .btn-hud {
            background: rgba(0, 243, 255, 0.03); color: var(--neon-cyan); border: 1px solid rgba(0, 243, 255, 0.4);
            padding: 8px 16px; border-radius: 4px; font-weight: bold; font-size: 11px; cursor: pointer;
            transition: all 0.2s; text-shadow: 0 0 4px var(--neon-cyan); font-family: 'Orbitron', sans-serif;
            text-transform: uppercase; letter-spacing: 1px; flex-shrink: 0; white-space: nowrap;
        }
        .btn-hud:hover { 
            background: rgba(0, 243, 255, 0.15); border-color: var(--neon-cyan);
            box-shadow: 0 0 15px rgba(0, 243, 255, 0.3); transform: translateY(-1px);
        }

        .main-container { width: 100%; max-width: 850px; display: flex; flex-direction: column; gap: 15px; }
        
        .arena-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 5px; }
        
        .fighter-card {
            background: var(--bg-card); border: 1px solid rgba(255,255,255,0.03); padding: 15px;
            border-radius: 6px; display: flex; flex-direction: column; align-items: center; text-align: center;
            position: relative; overflow: hidden;
        }
        .my-fighter { border-bottom: 3px solid var(--neon-cyan); }
        .enemy-fighter { border-bottom: 3px solid var(--neon-magenta); }

        .avatar-box {
            height: 160px; width: 100%; display: flex; align-items: center; justify-content: center;
            margin: 5px 0; transition: transform 0.4s ease;
        }
        .svg-layer { animation: floatMecha 3.5s ease-in-out infinite alternate; }
        
        @keyframes floatMecha {
            0% { transform: translateY(0px) rotate(0deg); }
            100% { transform: translateY(-6px) rotate(1deg); }
        }

        .hp-container { width: 100%; background: #02040a; border: 1px solid rgba(255,255,255,0.06); height: 12px; border-radius: 3px; margin-top: 10px; overflow: hidden; }
        .hp-bar { height: 100%; transition: width 0.3s ease; }
        .my-hp { background: var(--neon-green); width: 100%; box-shadow: 0 0 8px var(--neon-green); }
        .enemy-hp { background: var(--neon-magenta); width: 100%; box-shadow: 0 0 8px var(--neon-magenta); }

        .quiz-card {
            background: var(--bg-card); border: 1px solid rgba(0, 243, 255, 0.1); border-radius: 6px; padding: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); text-align: center;
        }
        .question-text { font-size: 16px; font-weight: 600; margin-bottom: 20px; min-height: 50px; color: #fff; line-height: 1.4; }
        
        .options-grid { display: grid; grid-template-columns: 1fr; gap: 10px; margin-bottom: 15px; }
        .option-btn {
            background: var(--bg-input); border: 1px solid rgba(255,255,255,0.08); color: var(--text-main);
            padding: 12px 15px; border-radius: 4px; font-family: 'Rajdhani', sans-serif; font-size: 14px;
            font-weight: 600; text-align: left; cursor: pointer; transition: all 0.2s;
        }
        .option-btn:hover {
            border-color: var(--neon-cyan); background: rgba(0, 243, 255, 0.05); color: #fff;
        }

        .battle-log {
            background: #02040a; border: 1px dashed rgba(255,255,255,0.05); padding: 10px;
            border-radius: 4px; font-family: 'Orbitron', sans-serif; font-size: 11px; color: var(--neon-yellow);
            min-height: 35px; display: flex; align-items: center; justify-content: center; text-align: center;
        }

        @media (max-width: 550px) {
            header { flex-direction: column; align-items: flex-start; gap: 14px; padding: 14px; }
            header .btn-hud { width: 100%; text-align: center; }
            .arena-grid { grid-template-columns: 1fr; }
            .avatar-box { height: 140px; }
            .question-text { font-size: 14px; }
        }
    </style>
</head>

        function generateHighEndSVG(type, customScale = 1.0, isEnemy = false) {
            let clr = isEnemy ? "var(--neon-magenta)" : "var(--neon-cyan)";
            let design = "";

            if (type === "Scholar") {
                design = `
                    <circle cx="50" cy="50" r="44" stroke="${clr}" stroke-width="1" fill="none" stroke-dasharray="4 6" opacity="0.4"/>
                    <circle cx="50" cy="50" r="38" stroke="var(--neon-purple)" stroke-width="1.5" fill="none" stroke-dasharray="25 5"/>
                    <polygon points="50,16 80,50 50,84 20,50" fill="#050914" stroke="${clr}" stroke-width="2.5"/>
                    <rect x="34" y="46" width="32" height="8" rx="2" fill="#010307" stroke="${clr}" stroke-width="1.5"/>
                    <line x1="38" y1="50" x2="62" y2="50" stroke="var(--neon-magenta)" stroke-width="2"/>
                `;
            } else if (type === "Creator") {
                clr = isEnemy ? "var(--neon-magenta)" : "var(--neon-yellow)";
                design = `
                    <g transform="rotate(45 50 50)"><rect x="22" y="22" width="56" height="56" fill="#04060f" stroke="${clr}" stroke-width="2" rx="6"/></g>
                    <rect x="26" y="26" width="48" height="48" fill="#080c18" stroke="var(--neon-magenta)" stroke-width="1" rx="4"/>
                    <circle cx="50" cy="50" r="12" fill="none" stroke="${clr}" stroke-width="1.5" stroke-dasharray="3 3"/>
                    <circle cx="42" cy="50" r="3" fill="#fff" filter="drop-shadow(0 0 4px ${clr})"/>
                    <circle cx="58" cy="50" r="3" fill="#fff" filter="drop-shadow(0 0 4px ${clr})"/>
                    <path d="M32,22 L22,6 M68,22 L78,6" stroke="${clr}" stroke-width="2" stroke-linecap="round"/>
                `;
            } else if (type === "Athlete") {
                clr = "var(--neon-magenta)";
                design = `
                    <polygon points="50,12 78,26 88,54 70,82 30,82 12,54 22,26" fill="#0a0307" stroke="${clr}" stroke-width="2.5"/>
                    <circle cx="50" cy="54" r="16" fill="none" stroke="var(--neon-yellow)" stroke-width="1.5" stroke-dasharray="8 4"/>
                    <polygon points="32,42 46,47 50,44 54,47 68,42 62,51 38,51" fill="#000" stroke="${clr}" stroke-width="1.5"/>
                    <line x1="38" y1="46" x2="62" y2="46" stroke="#fff" stroke-width="1.5"/>
                `;
            } else if (type === "ULTIMATE FUSION") {
                clr = isEnemy ? "var(--neon-magenta)" : "var(--neon-purple)";
                design = `
                    <circle cx="50" cy="50" r="42" fill="none" stroke="var(--neon-cyan)" stroke-width="1.5" stroke-dasharray="2 4"/>
                    <circle cx="50" cy="50" r="34" fill="#030208" stroke="${clr}" stroke-width="2.5"/>
                    <polygon points="50,34 62,50 50,66 38,50" fill="var(--neon-yellow)" filter="drop-shadow(0 0 8px var(--neon-yellow))"/>
                    <circle cx="50" cy="50" r="6" fill="none" stroke="#fff" stroke-width="1"/>
                `;
            } else {
                design = `
                    <circle cx="50" cy="50" r="32" fill="none" stroke="${clr}" stroke-width="2.5" stroke-dasharray="24 6"/>
                    <circle cx="50" cy="50" r="25" fill="#060b14" stroke="rgba(0, 243, 255, 0.2)" stroke-width="1.5"/>
                    <rect x="32" y="43" width="10" height="6" rx="1.5" fill="${clr}" filter="drop-shadow(0 0 5px ${clr})"/>
                    <rect x="58" y="43" width="10" height="6" rx="1.5" fill="${clr}" filter="drop-shadow(0 0 5px ${clr})"/>
                    <line x1="40" y1="58" x2="60" y2="58" stroke="${clr}" stroke-width="2.5" stroke-linecap="round"/>
                `;
            }

            return `
                <svg width="130" height="130" viewBox="0 0 100 100" class="svg-layer" style="transform: scale(${customScale}); filter: drop-shadow(0 0 10px ${clr});">
                    ${design}
                </svg>
            `;
        }

        function initBattle() {
            const m = gameState.monster;
            document.getElementById('my-name').innerText = m.name.toUpperCase();
            document.getElementById('my-lv').innerText = `LV. ${m.level}`;
            
            let currentScale = 1 + (m.level % 20) * 0.02;
            document.getElementById('my-avatar-wrapper').innerHTML = generateHighEndSVG(m.currentType, currentScale, false);

            let randomName = enemyNames[Math.floor(Math.random() * enemyNames.length)];
            let randomType = enemyTypes[Math.floor(Math.random() * enemyTypes.length)];
            let enemyLv = m.level + Math.floor(Math.random() * 3) - 1;
            if (enemyLv < 1) enemyLv = 1;

            document.getElementById('enemy-name').innerText = randomName;
            document.getElementById('enemy-lv').innerText = `LV. ${enemyLv}`;
            document.getElementById('enemy-avatar-wrapper').innerHTML = generateHighEndSVG(randomType, 1.0, true);

            myMaxHp = 100 + (m.level * 10);
            myCurrentHp = myMaxHp;
            enemyMaxHp = 80 + (enemyLv * 8);
            enemyCurrentHp = enemyMaxHp;

            combatActive = true;
            document.getElementById('next-btn').style.display = "none";
            document.getElementById('options-node').style.display = "grid";
            document.getElementById('battle-log-node').innerText = "LINK_ESTABLISHED: Database kuis terhubung, serang malware musuh!";
            
            updateHpGraphics();
            loadRandomQuestion();
        }

        function updateHpGraphics() {
            let myPct = (myCurrentHp / myMaxHp) * 100;
            let enemyPct = (enemyCurrentHp / enemyMaxHp) * 100;
            if(myPct < 0) myPct = 0;
            if(enemyPct < 0) enemyPct = 0;

            document.getElementById('my-hp-bar').style.width = myPct + "%";
            document.getElementById('my-hp-txt').innerText = `HP: ${myCurrentHp}/${myMaxHp}`;
            document.getElementById('enemy-hp-bar').style.width = enemyPct + "%";
            document.getElementById('enemy-hp-txt').innerText = `HP: ${enemyCurrentHp}/${enemyMaxHp}`;
        }

        function loadRandomQuestion() {
            if(!combatActive) return;
            
            currentQuestion = quizDatabase[Math.floor(Math.random() * quizDatabase.length)];
            document.getElementById('question-node').innerText = currentQuestion.q;

            const optionsContainer = document.getElementById('options-node');
            optionsContainer.innerHTML = '';

            currentQuestion.a.forEach((opt, idx) => {
                optionsContainer.innerHTML += `
                    <button class="option-btn" onclick="submitAnswer(${idx})">${['A', 'B', 'C', 'D'][idx]}. ${opt}</button>
                `;
            });
        }

        function submitAnswer(chosenIdx) {
            if(!combatActive) return;

            if(chosenIdx === currentQuestion.c) {
                let dmg = 15 + Math.floor(gameState.monster.level * 2);
                enemyCurrentHp -= dmg;
                document.getElementById('battle-log-node').innerText = `💥 CRITICAL_STRIKE! Jawaban benar, melukai musuh sebesar -${dmg} HP!`;
            } else {
                let enemyDmg = 12 + Math.floor(gameState.monster.level * 1.5);
                myCurrentHp -= enemyDmg;
                document.getElementById('battle-log-node').innerText = `⚠️ SYSTEM_BREACH! Jawaban salah. Malware membalas sebesar -${enemyDmg} HP!`;
            }

            updateHpGraphics();
            checkBattleResolution();

            if(combatActive) {
                combatActive = false;
                setTimeout(() => {
                    combatActive = true;
                    loadRandomQuestion();
                }, 1300);
            }
        }

        function checkBattleResolution() {
            if(enemyCurrentHp <= 0) {
                combatActive = false;
                let expReward = 35 + (gameState.monster.level * 3);
                gameState.monster.exp += expReward;

                if (gameState.monster.exp >= 100) {
                    gameState.monster.level += 1;
                    gameState.monster.exp = 0;
                    alert(`⚡ OVERCLOCK LEVEL UP! Monster naik ke Level ${gameState.monster.level}!`);
                }

                document.getElementById('battle-log-node').innerText = `🏆 COMBAT_VICTORY: Malware hancur! +${expReward} EXP berhasil diserap.`;
                endTurnSequence();
            } 
            else if(myCurrentHp <= 0) {
                combatActive = false;
                document.getElementById('battle-log-node').innerText = `💀 SYSTEM_CRASH: Pertahanan jebol. Monstermu terkapar.`;
                endTurnSequence();
            }
        }

        function endTurnSequence() {
            document.getElementById('options-node').innerHTML = '';
            document.getElementById('next-btn').style.display = "block";
            localStorage.setItem('kerjainSyamData', JSON.stringify(gameState));
        }

        function nextTurn() {
            initBattle();
        }

        function backToCore() {
            localStorage.setItem('kerjainSyamData', JSON.stringify(gameState));
            window.location.href = 'index.html';
        }

        initBattle();
    </script>
